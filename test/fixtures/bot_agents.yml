support_bot:
  name: Support Bot
  provider: openai
  llm_model: gpt-4o
  system_prompt: >
    You are a support assistant for an ecommerce store. Help customers with
    order issues such as delivery status, missing items, damaged items, returns,
    and refunds. Use "we" instead of "I" when referring to the support team.
    Route high-risk, low-confidence, or unresolvable issues to behind-the-scenes
    operator review.
  active: true

inactive_bot:
  name: Legacy Bot
  provider: openai
  llm_model: gpt-3.5-turbo
  system_prompt: An older bot configuration.
  active: false

fireworks_bot:
  name: Fireworks Bot
  provider: fireworks
  llm_model: accounts/fireworks/models/kimi-k2p6
  system_prompt: A Fireworks AI bot configuration.
  active: false
